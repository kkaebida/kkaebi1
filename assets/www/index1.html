<script>
    function exitToast() {
        var t = $('<div class="ui-loader ui-overlay-shadow ui-body-e ui-corner-all" style="font-family:Dosis;font-size:large">한번 더누르시면 종료됩니다</div>');
        t.css({
            display: "block",
            background: "gray",
            color: "white",
            opacity: .75,
            position: "fixed",
            padding: "1px",
            width: "170px",
            "text-align": "center",
            left: ($(window).width() - 180) / 2,
            top: $(window).height() - 80
        });
        var e = function() {
            $(this).remove()
        };
        t.click(e), t.appendTo($.mobile.pageContainer).delay(1e3), t.fadeOut(400, e)
    }

 
</script>
<script src=cordova.js></script>
<script>
   var exitApp = !1,
        intval = setInterval(function() {
            exitApp = !1
        }, 3500);
        document.addEventListener("backbutton", function(t) {
        t.preventDefault(), exitApp ? clearInterval(intval)(navigator.app && navigator.app.exitApp()) || device && device.exitApp() : (exitApp = !0, window.scrollTo(0, 0), exitToast())
    }, !1);
</script>
