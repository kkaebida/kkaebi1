<script>
    function exitToast() {
        var t = $('<div class="ui-loader ui-overlay-shadow ui-body-e ui-corner-all" style="font-family:Dosis;font-size:large">한번 더누르시면 종료됩니다</div>');

            display: "block",

            opacity: .75,
            position: "fixed",
            padding: "1px",
            width: "170px",
            "text-align": "center",

        };

    }
